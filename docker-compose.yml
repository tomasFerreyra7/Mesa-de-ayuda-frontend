# Levanta el backend (build desde ../../backend/sistemap-backend) y el frontend.
# Uso: docker-compose up --build
# Backend en http://localhost:8080/v1 | Frontend en http://localhost:3000

services:
  backend:
    build:
      context: ../../backend/sistemap-backend
      dockerfile: Dockerfile
    image: sistemap-backend
    container_name: sistemapj-backend
    ports:
      - '8080:8080'
    env_file:
      - .env
    restart: 'no'

  frontend:
    build: .
    container_name: sistemapj-frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/v1
    ports:
      - '3000:3000'

